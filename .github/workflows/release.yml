name: Release to NuGet

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write   # required for NuGet trusted publishing (OIDC token issuance)
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Read package version from OpenAPI spec
      id: version
      run: |
        version=$(grep -m1 '^  version:' api/openapi.yaml | sed -E "s/^  version:[[:space:]]*//; s/[[:space:]]*$//; s/['\"]//g")
        if [ -z "$version" ]; then echo "::error::Could not read info.version from api/openapi.yaml"; exit 1; fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "Package version: $version"
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build -c Release --no-restore
    - name: Test
      run: dotnet test -c Release --no-build
    - name: Pack
      run: >-
        dotnet pack src/MangaUpdates/MangaUpdates.csproj -c Release --no-build
        -p:PackageLicenseExpression=MIT
        -p:Version=${{ steps.version.outputs.version }}
        --output .
    # --- Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet API key ---
    # Prerequisite: configure a Trusted Publishing policy on nuget.org (Account > Trusted Publishing)
    # for owner "filipe-silva", repo "MangaUpdates.NET", workflow file "release.yml".
    - name: NuGet login (OIDC -> temporary API key)
      id: login
      uses: NuGet/login@v1
      with:
        user: ${{ secrets.NUGET_USER }}   # nuget.org username (profile name), NOT email
    - name: Push to NuGet
      run: >-
        dotnet nuget push "*.nupkg"
        --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
        --source https://api.nuget.org/v3/index.json
